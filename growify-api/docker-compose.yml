services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: growify
      POSTGRES_PASSWORD: growify
      POSTGRES_DB: growify
    ports:
      - "5433:5432"
    volumes:
      - growify_pgdata:/var/lib/postgresql/data

volumes:
  growify_pgdata:
